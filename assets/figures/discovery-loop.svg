<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 640" role="img" aria-labelledby="title desc">
  <title id="title">AI and DFT closed-loop materials discovery</title>
  <desc id="desc">A stylized closed loop connecting composition space, machine learning, DFT validation, synthesis feedback, and database curation.</desc>
  <rect width="860" height="640" fill="#f8f6f0"/>
  <path d="M0 500 C170 428 258 507 422 444 C590 379 682 428 860 352 L860 640 L0 640 Z" fill="#e6d6bf"/>
  <path d="M0 120 C145 162 260 78 410 116 C582 159 691 93 860 142" fill="none" stroke="#d9dfdc" stroke-width="2"/>
  <g fill="none" stroke="#16201e" stroke-width="3" stroke-linecap="round">
    <path d="M256 322 C264 190 368 116 490 140"/>
    <path d="M594 220 C710 296 690 446 578 512"/>
    <path d="M462 546 C315 544 210 450 256 322"/>
  </g>
  <g fill="#16201e">
    <path d="M486 128l36 20-38 14 8-16-6-18Z"/>
    <path d="M588 502l-38 11 17-36 7 17 14 8Z"/>
    <path d="M244 334l-16-37 40 9-16 10-8 18Z"/>
  </g>
