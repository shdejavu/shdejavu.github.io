      <text x="24" y="73" font-size="15" fill="#53615d">Millions of possible</text>
      <text x="24" y="96" font-size="15" fill="#53615d">structures and chemistries</text>
      <circle cx="182" cy="88" r="10" fill="#b55d3a"/>
      <circle cx="203" cy="70" r="7" fill="#1d756f"/>
      <circle cx="160" cy="62" r="6" fill="#c5a05a"/>
