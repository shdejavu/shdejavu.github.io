    <g transform="translate(500 88)">
      <rect width="250" height="132" rx="8" fill="#16201e"/>
      <text x="24" y="42" font-size="20" font-weight="800" fill="#fff">ML prioritization</text>
      <text x="24" y="76" font-size="15" fill="#d5ded9">Active learning,</text>
      <text x="24" y="99" font-size="15" fill="#d5ded9">screening, uncertainty</text>
