      <text x="24" y="42" font-size="19" font-weight="800" fill="#16201e">Synthesis feedback</text>
      <text x="24" y="76" font-size="15" fill="#53615d">Experiment, databases,</text>
      <text x="24" y="99" font-size="15" fill="#53615d">and the next search</text>
